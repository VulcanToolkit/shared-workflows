name: '🔎 Vulcan Review'
description: Review PR and commit code for consistency

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: Any additional context from the request
        required: false
      requested_pr_review:
        type: 'string'
        description: Whether a pull request review was requested ('true' or 'false')
        required: false
        default: 'true'
      requested_commit_review:
        type: 'string'
        description: Whether a commit review was requested ('true' or 'false')
        required: false
        default: 'false'
    secrets:
      gemini-api-key:
        required: true
      github-token:
        required: true

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    outputs:
      commits: ${{ steps.get-pr-commits.outputs.commits }}
      commit-hashes: ${{ steps.get-pr-commits.outputs.commit-hashes }}
      should-review-commits: ${{ steps.post-comment.outputs.should-review-commits }}
      token: ${{ steps.mint-identity-token.outputs.token }}
    steps:
      - name: Mint identity token
        id: mint-identity-token
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf' # ratchet:actions/create-github-app-token@v2
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: Checkout repository
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      - name: Run Vulcan pull request review
        id: vulcan-pr-review
        uses: 'google-github-actions/run-gemini-cli@v0.1.21' # ratchet:exclude
        if: ${{ inputs.requested_pr_review == 'true' }}
        env:
          GITHUB_TOKEN: '${{ steps.mint-identity-token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          ISSUE_TITLE: '${{ github.event.pull_request.title || github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.pull_request.body || github.event.issue.body }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
          GEMINI_API_KEY: '${{ secrets.gemini-api-key }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.gemini-api-key }}'
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION || '0.38.1' }}
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-review'
          # Explicitly set the PR number to handle `issue_comment` triggers (which GitHub treats as issues, not PRs)
          github_pr_number: '${{ github.event.pull_request.number }}'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 50
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "output": {
                "format": "json"
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          extensions: |
            [
              "https://github.com/VulcanToolkit/gemini-extension"
            ]
          prompt: '/vulcan-review-pr'

      - name: Post Comment
        id: post-comment
        if: ${{ inputs.requested_pr_review == 'true' }}
        uses: actions/github-script@v7
        env:
          GEMINI_OUTPUT: '${{ steps.vulcan-pr-review.outputs.summary }}'
        with:
          github-token: ${{ secrets.github-token }}
          script: |
            const { postPullRequestReview } = require('./.github/workflows/scripts/post-vulcan-review.js');
            return await postPullRequestReview(github, context, core);

      - name: Get PR Commits
        id: get-pr-commits
        if: ${{ inputs.requested_commit_review == 'true' || steps.review.outputs.should-review-commits == 'true' }}
        uses: 'actions/github-script@v7'
        with:
          github-token: ${{ secrets.github-token }}
          result-encoding: string
          script: |
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request ? context.payload.pull_request.number : context.payload.issue.number,
            });

            // List of hashes for the matrix strategy
            core.setOutput("commit-hashes", JSON.stringify(commits.data.map(x => x.sha)))

            // Map of hash to commit information for reporting
            const commit_map = Object.fromEntries(commits.data.map(x => [x.sha, x]));
            core.setOutput("commits", JSON.stringify(commit_map))

  per-commit-review:
    needs: review
    if: ${{ inputs.requested_commit_review == 'true' || needs.review.outputs.should-review-commits == 'true' }}
    runs-on: 'ubuntu-latest'
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    strategy:
      matrix:
        commit: ${{ fromJson(needs.review.outputs.commit-hashes) }}
    steps:
      - name: Checkout repository
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6
        with:
          ref: '${{ matrix.commit }}'

      - name: Run Vulcan commit review
        id: vulcan-commit-review
        uses: 'google-github-actions/run-gemini-cli@v0.1.21' # ratchet:exclude
        env:
          GITHUB_TOKEN: '${{ needs.review.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          COMMIT_MESSAGE: '${{ fromJson(needs.review.outputs.commits)[matrix.commit].commit.message }}'
          COMMIT_SHA: '${{ matrix.commit }}'
          REPOSITORY: '${{ github.repository }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
          GEMINI_API_KEY: '${{ secrets.gemini-api-key }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.gemini-api-key }}'
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION || '0.38.1' }}
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-review'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 50
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "output": {
                "format": "json"
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)",
                  "run_shell_command(git)"
                ]
              }
            }
          extensions: |
            [
              "https://github.com/VulcanToolkit/gemini-extension"
            ]
          prompt: '/vulcan-review-commit'

      - name: Post Comment
        uses: actions/github-script@v7
        id: collect-outputs
        env:
          COMMIT_SHA: '${{ matrix.commit }}'
          GEMINI_OUTPUT: '${{ steps.vulcan-commit-review.outputs.summary }}'
        with:
          github-token: ${{ secrets.github-token }}
          script: |
            const fs = require('fs');
            const content = process.env.GEMINI_OUTPUT;
            fs.writeFileSync(`vulcan-review-${process.env.COMMIT_SHA}.txt`, content);

      - name: Create review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vulcan-review-${{ matrix.commit }}
          path: vulcan-review-${{ matrix.commit }}.txt

  finish-per-commit-review:
    needs: [review, per-commit-review]
    runs-on: 'ubuntu-latest'
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: vulcan-review-*
          merge-multiple: true

      - name: Post Comment
        uses: actions/github-script@v7
        env:
          COMMITS: '${{ needs.review.outputs.commits }}'
        with:
          github-token: ${{ secrets.github-token }}
          script: |
            const { postAggregateCommitReview } = require('./.github/workflows/scripts/post-vulcan-review.js');
            return await postAggregateCommitReview(github, context, core);
